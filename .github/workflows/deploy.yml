name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

# Only one deploy at a time — cancel in-progress if new push arrives
concurrency:
  group: deploy
  cancel-in-progress: false  # Don't cancel mid-deploy (could interrupt position flatten)

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -x --tb=short -q

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass
    # Only deploy from main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_KEY_FILE: ~/.ssh/deploy_key
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/futures-trader' }}
          BRANCH: main
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh

      - name: Verify service health
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "systemctl is-active futures-trader && echo 'Service healthy' || (echo 'Service FAILED' && exit 1)"

      - name: Post deploy status
        if: failure()
        run: |
          echo "::error::Deployment failed! Check VPS logs."
          # If you have Telegram configured, this could send an alert
