name: Deploy to VPS

on:
  # Auto-deploy on push DISABLED — causes double restarts when also deploying manually.
  # Use workflow_dispatch (manual trigger from GitHub UI) instead.
  # push:
  #   branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

# Only one deploy at a time
concurrency:
  group: deploy
  cancel-in-progress: false  # Don't cancel mid-deploy (could interrupt position flatten)

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -x --tb=short -q

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          DEPLOY_PATH: /opt/futures-trader
          BRANCH: main
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh

      - name: Verify service health
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          sleep 10
          sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
            ${SSH_USER}@${SSH_HOST} \
            "systemctl is-active futures-trader && echo 'Service healthy' || (echo 'Service FAILED' && exit 1)"

      - name: Post deploy status
        if: failure()
        run: |
          echo "::error::Deployment failed! Check VPS logs."
