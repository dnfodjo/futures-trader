name: VPS Monitor

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: false
        default: "status"
        type: choice
        options:
          - status
          - logs
          - app-logs
          - journal
          - health
          - decisions
          - errors
          - ql-config
          - service-file

jobs:
  monitor:
    name: VPS Monitor
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Run monitor command
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          COMMAND: ${{ inputs.command }}
        run: |
          SSH_CMD="sshpass -p '${SSH_PASSWORD}' ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          case "${COMMAND}" in
            status)
              echo "=== Service Status ==="
              eval ${SSH_CMD} "systemctl status futures-trader --no-pager -l | head -30"
              echo ""
              echo "=== Memory Usage ==="
              eval ${SSH_CMD} "ps aux --sort=-%mem | head -5"
              echo ""
              echo "=== Uptime ==="
              eval ${SSH_CMD} "uptime"
              ;;
            logs)
              echo "=== Last 100 journalctl Lines ==="
              eval ${SSH_CMD} "journalctl -u futures-trader --no-pager -n 100"
              ;;
            app-logs)
              echo "=== Last 200 App Log Lines ==="
              eval ${SSH_CMD} "tail -200 /opt/futures-trader/logs/trader.log 2>/dev/null || echo 'No app log file found'"
              ;;
            journal)
              echo "=== Recent Trades ==="
              eval ${SSH_CMD} "cd /opt/futures-trader && .venv/bin/python -c \"
              import sqlite3, json
              db = sqlite3.connect('data/journal.db')
              db.row_factory = sqlite3.Row
              rows = db.execute('SELECT * FROM trades ORDER BY rowid DESC LIMIT 10').fetchall()
              for r in rows:
                  print(json.dumps(dict(r), default=str))
              db.close()
              \" 2>/dev/null || echo 'No journal DB or no trades yet'"
              ;;
            health)
              echo "=== Full Health Check ==="
              eval ${SSH_CMD} "systemctl is-active futures-trader && echo 'Service: ACTIVE' || echo 'Service: DOWN'"
              echo ""
              eval ${SSH_CMD} "df -h /opt/futures-trader | tail -1"
              echo ""
              eval ${SSH_CMD} "free -h | head -2"
              echo ""
              echo "=== .env Config (non-secret) ==="
              eval ${SSH_CMD} "grep -E '^TRADE_' /opt/futures-trader/.env"
              ;;
            decisions)
              echo "=== Recent LLM Decisions from App Log ==="
              eval ${SSH_CMD} "grep -iE 'action_validated|llm_decision|trade_entry|trade_exit|do_nothing|confidence|ENTER|FLATTEN' /opt/futures-trader/logs/trader.log 2>/dev/null | tail -50 || echo 'No decisions found'"
              echo ""
              echo "=== Recent Decisions from journalctl ==="
              eval ${SSH_CMD} "journalctl -u futures-trader --no-pager -n 1000 2>/dev/null | grep -iE 'action|decision|enter|exit|flatten|confidence|quantity|do_nothing' | tail -30"
              ;;
            errors)
              echo "=== Recent Errors from App Log ==="
              eval ${SSH_CMD} "grep -iE 'error|exception|traceback|failed' /opt/futures-trader/logs/trader.log 2>/dev/null | tail -30 || echo 'No errors in app log'"
              echo ""
              echo "=== Recent Errors from journalctl ==="
              eval ${SSH_CMD} "journalctl -u futures-trader --no-pager -n 500 --priority=err 2>/dev/null | tail -20"
              ;;
            ql-config)
              echo "=== QuantLynk Config (masked) ==="
              eval ${SSH_CMD} "grep -E '^QL_' /opt/futures-trader/.env 2>/dev/null | sed 's/\(=.\{8\}\).*/\1...MASKED/' || echo 'No QL_ vars found'"
              echo ""
              echo "=== QuantLynk Logs ==="
              eval ${SSH_CMD} "grep -iE 'quantlynk|ql_|webhook' /opt/futures-trader/logs/trader.log 2>/dev/null | tail -30 || echo 'No QuantLynk logs'"
              echo ""
              echo "=== All Enabled Flags ==="
              eval ${SSH_CMD} "grep -iE 'enabled|disabled|dry|paper' /opt/futures-trader/.env 2>/dev/null || echo 'No flags found'"
              ;;
            service-file)
              echo "=== systemd Service File ==="
              eval ${SSH_CMD} "cat /etc/systemd/system/futures-trader.service"
              echo ""
              echo "=== Recent journalctl (full output, last 200 lines) ==="
              eval ${SSH_CMD} "journalctl -u futures-trader --no-pager -n 200 --output=cat"
              ;;
          esac
